<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer dark border -->
  <path fill="#1a0d2e" fill-rule="evenodd"
        d="M0,0 H100 V100 H0 Z M1.5,1.5 V98.5 H98.5 V1.5 Z"/>

  <!-- Main purple frame body -->
  <path fill="#6f2e9a" fill-rule="evenodd"
        d="M1.5,1.5 H98.5 V98.5 H1.5 Z M19,19 V81 H81 V19 Z"/>

  <!-- Bevel: top face (lighter — faces light source) -->
  <polygon points="1.5,1.5 98.5,1.5 81,19 19,19" fill="#9040cc"/>
  <!-- Bevel: left face -->
  <polygon points="1.5,1.5 19,19 19,81 1.5,98.5" fill="#7d36b0"/>
  <!-- Bevel: bottom face (darker — in shadow) -->
  <polygon points="1.5,98.5 98.5,98.5 81,81 19,81" fill="#4d1a7a"/>
  <!-- Bevel: right face (darkest) -->
  <polygon points="98.5,1.5 98.5,98.5 81,81 81,19" fill="#451575"/>

  <!-- Inner edge: dark separator line -->
  <rect x="18.5" y="18.5" width="63" height="63" fill="none"
        stroke="#1a0d2e" stroke-width="1.5"/>
  <!-- Inner edge: highlight line -->
  <rect x="20" y="20" width="60" height="60" fill="none"
        stroke="#c4a4f0" stroke-width="0.75"/>

  <!-- Outer corner diamonds -->
  <polygon points="5,2 8,5 5,8 2,5" fill="#c4a4f0"/>
  <polygon points="95,2 98,5 95,8 92,5" fill="#c4a4f0"/>
  <polygon points="5,92 8,95 5,98 2,95" fill="#c4a4f0"/>
  <polygon points="95,92 98,95 95,98 92,95" fill="#c4a4f0"/>

  <!-- Inner corner diamonds -->
  <polygon points="19,15.5 22.5,19 19,22.5 15.5,19" fill="#c4a4f0"/>
  <polygon points="81,15.5 84.5,19 81,22.5 77.5,19" fill="#c4a4f0"/>
  <polygon points="19,77.5 22.5,81 19,84.5 15.5,81" fill="#c4a4f0"/>
  <polygon points="81,77.5 84.5,81 81,84.5 77.5,81" fill="#c4a4f0"/>

  <!-- Mid-edge diamond accents -->
  <polygon points="50,1 52.5,3.5 50,6 47.5,3.5" fill="#c4a4f0"/>
  <polygon points="50,94 52.5,96.5 50,99 47.5,96.5" fill="#c4a4f0"/>
  <polygon points="1,50 3.5,52.5 6,50 3.5,47.5" fill="#c4a4f0"/>
  <polygon points="94,50 96.5,52.5 99,50 96.5,47.5" fill="#c4a4f0"/>
</svg>
