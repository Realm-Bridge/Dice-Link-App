<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="/static/css/style-simple.css?v=91">
    <script src="https://kit.fontawesome.com/39d7cc98ef.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: var(--dlc-bg-section); }
        .settings-panel {
            width: 100%;
            height: 100vh;
            border: none;
            border-radius: 0;
            box-shadow: none;
            max-height: none;
        }
    </style>
</head>
<body>
    <div class="settings-panel">
        <div class="settings-header">
            <h2><i class="fas fa-cog"></i> Settings</h2>
            <button class="settings-close-btn" onclick="window.close()" title="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="settings-body">
            <nav class="settings-nav">
                <button class="settings-nav-btn active" data-section="account">
                    <i class="fas fa-user"></i><span>Account</span>
                </button>
                <button class="settings-nav-btn" data-section="notifications">
                    <i class="fas fa-bell"></i><span>Notifications</span>
                </button>
            </nav>
            <div class="settings-content">

                <div class="settings-section active" id="settings-section-account">
                    <div class="settings-section-title">Account</div>
                    <div class="settings-field">
                        <label>Manage Account</label>
                        <p class="settings-help-text">Change your email, password, or subscription on the Realm Bridge website.</p>
                        <a href="https://realmbridge.co.uk/" class="settings-link" id="settings-account-link">
                            <i class="fas fa-external-link-alt"></i> realmbridge.co.uk
                        </a>
                    </div>
                    <div class="settings-field settings-toggle-field">
                        <div class="settings-toggle-label">
                            <label>Record dice roll history</label>
                            <p class="settings-help-text">Stores your roll results locally on this machine for stats tracking.</p>
                        </div>
                        <label class="settings-toggle">
                            <input type="checkbox" id="settings-record-rolls" checked>
                            <span class="settings-toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-section" id="settings-section-notifications">
                    <div class="settings-section-title">Notifications</div>
                    <p class="settings-coming-soon">
                        <i class="fas fa-bell-slash"></i>
                        Notification settings are coming soon.
                    </p>
                </div>

            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.settings-nav-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.settings-nav-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.settings-section').forEach(function(s) { s.classList.remove('active'); });
                btn.classList.add('active');
                var section = document.getElementById('settings-section-' + btn.dataset.section);
                if (section) section.classList.add('active');
            });
        });

        fetch('/api/config').then(function(r) { return r.json(); }).then(function(config) {
            var toggle = document.getElementById('settings-record-rolls');
            if (toggle) toggle.checked = config.record_rolls !== false;
        }).catch(function() {});

        document.getElementById('settings-record-rolls').addEventListener('change', function(e) {
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ record_rolls: e.target.checked })
            }).catch(function() {});
        });
    </script>
</body>
</html>
