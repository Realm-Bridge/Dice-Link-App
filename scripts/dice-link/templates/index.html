<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/style-simple.css?v=57">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <!-- Custom Frameless Title Bar -->
        <header class="custom-title-bar" id="title-bar">
            <div class="title-bar-left">
                <button id="settings-btn" class="title-bar-icon-btn" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
                <div id="connection-status" class="connection-status disconnected">
                    <span class="status-indicator"></span>
                    <span id="connection-status-text" class="status-text">Disconnected</span>
                </div>
            </div>
            <div class="title-bar-centre">
                <img src="/static/Logos/DL_Logo_No_Background.png" alt="Dice Link" class="title-bar-logo" draggable="false" />
            </div>
            <div class="title-bar-right">
                <button class="title-bar-btn minimize-btn" id="minimize-btn" title="Minimize">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="title-bar-btn close-btn" id="close-btn" title="Close">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dice Tray -->
            <div class="dice-tray-container">
                <!-- Dice Tray (always visible) -->
                <div class="dice-tray">
                    <!-- Formula input -->
                    <div class="dice-formula-row">
                        <input type="text" id="dice-formula-input" class="dice-formula-input" value="/r " placeholder="/r 1d20" />
                    </div>
                    
                    <!-- Dice buttons with counts -->
                    <div class="dice-buttons-row">
                        <button class="dice-btn" data-die="4" title="d4 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D4/d4-blank.svg" alt="d4" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="6" title="d6 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D6/d6-blank.svg" alt="d6" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="8" title="d8 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D8/d8-blank.svg" alt="d8" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="10" title="d10 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D10/d10-blank.svg" alt="d10" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="12" title="d12 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D12/d12-blank.svg" alt="d12" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="20" title="d20 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D20/d20-blank.svg" alt="d20" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                        <button class="dice-btn" data-die="100" title="d100 (Left: add, Right: remove)">
                            <img src="/static/DLC Dice/D100/d100-blank.svg" alt="d100" class="die-icon" />
                            <span class="die-count" style="display: none;">0</span>
                        </button>
                    </div>
                    
                    <!-- Controls -->
                    <div class="dice-controls">
                        <button type="button" class="dice-modifier-btn" id="dice-modifier-minus" title="Decrease modifier">−</button>
                        <span id="dice-modifier-value" class="dice-modifier-value">0</span>
                        <button type="button" class="dice-modifier-btn" id="dice-modifier-plus" title="Increase modifier">+</button>
                        <button type="button" class="dice-adv-btn" data-mode="normal" title="Toggle Advantage/Disadvantage">ADV/DIS</button>
                        <button type="button" class="dice-roll-btn btn-success" id="dice-roll-btn" title="Roll dice">Roll</button>
                    </div>
                </div>
            </div>

            <!-- Roll Window (expandable overlay) - Hidden by default -->
            <div id="roll-window" class="roll-window hidden">
                <!-- Idle State (default) -->
                <div id="roll-window-idle" class="roll-window-state active">
                    <p>Waiting for roll requests...</p>
                </div>

                <!-- Roll Request State -->
                <div id="roll-window-request" class="roll-window-state">
                    <div class="roll-window-header">
                        <h4 id="rw-title">Roll Request</h4>
                        <p id="rw-subtitle" class="rw-subtitle"></p>
                    </div>
                    
                    <div id="rw-config-section" class="rw-config-section">
                        <!-- Config fields rendered here -->
                    </div>
                    
                    <div id="rw-action-buttons" class="rw-buttons">
                        <!-- Action buttons rendered here -->
                    </div>
                    
                    <button id="rw-cancel-btn" class="roll-action-btn cancel rw-cancel-btn">
                        Cancel Roll
                    </button>
                </div>

                <!-- Dice Entry State -->
                <div id="roll-window-dice-entry" class="roll-window-state">
                    <div class="rw-dice-entry-header hidden">
                        <p id="rw-dice-formula">Roll dice:</p>
                    </div>
                    
                    <div id="rw-dice-inputs" class="rw-dice-inputs">
                        <!-- Dice inputs rendered here -->
                    </div>
                    

                </div>
            </div>

            <!-- Player Modes Section -->
            <div class="player-modes-section" id="player-modes-section">
                <div class="section-header">
                    <h3><i class="fas fa-users"></i> Player Modes</h3>
                </div>
                
                <div class="section-content">
                    <!-- Legend -->
                    <div class="mode-legend">
                        <span class="legend-item"><span class="mode-dot digital"></span>Digital</span>
                        <span class="legend-item"><span class="mode-dot manual"></span>Manual</span>
                        <span class="legend-item"><span class="mode-dot pending"></span>Pending</span>
                    </div>
                    
                    <!-- Pending Requests (GM only) -->
                    <div class="pending-requests" id="pending-requests" style="display: none;">
                        <h4><i class="fas fa-clock"></i> Pending Requests (<span id="pending-count">0</span>)</h4>
                        <div class="pending-list" id="pending-list">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                    
                    <!-- Player Grid -->
                    <div class="players-grid" id="players-grid">
                        <!-- Populated dynamically -->
                    </div>
                    
                    <!-- No Players Message -->
                    <p class="no-players" id="no-players" style="display: none;">No players connected.</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <button id="cancel-roll" class="btn btn-danger hidden">
                Cancel Roll
            </button>
            <span class="version">v{{ app_version }}</span>
            <a href="#" class="footer-realm-bridge-link" onclick="event.preventDefault(); window.pyqtBridge?.openUrl('https://realmbridge.co.uk/')">
                <img src="/static/Logos/New_logo.png" alt="Realm Bridge" class="footer-realm-bridge-icon" draggable="false" />
            </a>
        </footer>
    </div>

    <!-- Settings Panel Overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
        <div id="settings-panel" class="settings-panel">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="settings-close" class="icon-btn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <h3 class="settings-section-title">Connection</h3>
                    <div class="settings-field">
                        <label for="settings-host">WebSocket Host</label>
                        <input type="text" id="settings-host" value="localhost" placeholder="localhost">
                    </div>
                    <div class="settings-field">
                        <label for="settings-port">WebSocket Port</label>
                        <input type="number" id="settings-port" value="8765" min="1" max="65535">
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">Appearance</h3>
                    <div class="settings-field">
                        <label for="settings-theme">Theme</label>
                        <select id="settings-theme">
                            <option value="dark" selected>Dark</option>
                            <option value="light" disabled>Light (Coming Soon)</option>
                        </select>
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">Camera</h3>
                    <div class="settings-field">
                        <label for="settings-camera">Camera Device</label>
                        <select id="settings-camera">
                            <option value="">Loading cameras...</option>
                        </select>
                    </div>
                    <div class="camera-preview-container">
                        <div id="camera-preview" class="camera-preview">
                            <p class="camera-preview-placeholder">Select a camera to see preview</p>
                        </div>
                        <button id="refresh-camera-preview" class="btn btn-secondary btn-small">
                            Refresh Preview
                        </button>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button id="settings-save" class="btn btn-primary">Save Settings</button>
                    </div>
                </div>
            </div>

    <!-- Core Modules (no dependencies) -->
    <script src="/static/js/debug.js?v=1"></script>
    <script src="/static/js/constants.js?v=1"></script>
    
    <!-- State Management -->
    <script src="/static/js/state.js?v=1"></script>
    
    <!-- Utilities -->
    <script src="/static/js/utils.js?v=1"></script>
    
    <!-- WebSocket Communication -->
    <script src="/static/js/websocket.js?v=1"></script>
    
    <!-- UI Modules -->
    <script src="/static/js/ui/connection.js?v=1"></script>
    <script src="/static/js/ui/settings.js?v=1"></script>
    <script src="/static/js/ui/roll-window.js?v=2"></script>
    <script src="/static/js/ui/dice-tray.js?v=1"></script>
    <script src="/static/js/ui/dice-entry.js?v=2"></script>
    <script src="/static/js/ui/player-modes.js?v=1"></script>
    <script src="/static/js/ui/window-control.js?v=1"></script>
    
    <!-- Main App (depends on all other modules) -->
    <script src="/static/js/client.js?v=1"></script>
</body>
</html>
