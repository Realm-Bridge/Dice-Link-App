<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Login</title>
    <link rel="stylesheet" href="/static/css/style-simple.css?v=57">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        .startup-app-container {
            width: 450px;
            height: 520px;
            overflow: hidden;
            border-radius: 12px;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Title bar - same height as main window, no title text */
        .startup-title-bar {
            display: flex;
            align-items: center;
            height: 40px;
            background-color: var(--bg-primary);
            position: relative;
            flex-shrink: 0;
            -webkit-app-region: drag;
            z-index: 10;
        }

        /* Logo in title bar - top left corner, 3x size, overflows into body */
        .startup-title-bar-logo {
            height: 84px;
            position: absolute;
            left: 8px;
            top: 8px;
            z-index: 20;
            -webkit-app-region: no-drag;
            pointer-events: none;
        }

        /* Right side buttons */
        .startup-title-bar-right {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            padding-right: 8px;
            -webkit-app-region: no-drag;
        }

        .startup-title-bar-btn {
            width: 28px;
            height: 28px;
            background-color: transparent;
            border: none;
            border-radius: 4px;
            color: var(--dlc-accent);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .startup-title-bar-btn:hover {
            background-color: rgba(139, 92, 246, 0.1);
        }

        .startup-title-bar-btn.close-btn:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Content area */
        .startup-content {
            padding: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* "Login" title - centered at top in title bar */
        .startup-title-text {
            color: var(--text-primary);
            font-size: 22px;
            font-weight: bold;
            margin: 0;
            padding: 0;
            text-align: center;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
        }

        .startup-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .form-row label {
            width: 110px;
            color: var(--text-primary);
            font-size: 14px;
            text-align: right;
            flex-shrink: 0;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            padding: 8px 10px;
            background-color: var(--bg-input);
            border: 1px solid var(--dlc-border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 12px;
        }

        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: var(--dlc-accent-pink);
        }

        .form-row select option:disabled {
            color: var(--text-muted);
        }

        .form-row select optgroup {
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
            font-style: normal;
        }

        .connect-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }

        .connect-btn {
            width: 160px;
            height: 40px;
            background-color: var(--dlc-accent);
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .connect-btn:hover {
            background-color: var(--dlc-accent-pink);
        }

        .startup-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 12px;
        }

        .create-account-link {
            color: #0066cc;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .create-account-link:hover {
            color: #0080ff;
        }

        .realm-bridge-logo {
            height: 19px;
        }
    </style>
</head>
<body>
    <div class="startup-app-container">

        <!-- Title bar - use reusable _title_bar.html -->
        {% include "_title_bar.html" %}

        <!-- Main Content -->
        <div class="startup-content">

            <!-- Login Form -->
            <form class="startup-form" id="startup-form">
                <div class="form-row">
                    <label for="vtt-select">Connect me to:</label>
                    <select id="vtt-select">
                        <option value="" disabled selected>Please Select</option>
                        <optgroup label="Active">
                            <option value="foundry">Foundry VTT</option>
                        </optgroup>
                        <optgroup label="Road Mapped">
                            <option value="beyond-tabletop" disabled>Beyond Tabletop</option>
                            <option value="discord" disabled>Discord</option>
                            <option value="dnd-beyond-maps" disabled>DnD Beyond Maps</option>
                            <option value="fantasy-grounds" disabled>Fantasy Grounds</option>
                            <option value="game-master-engine" disabled>Game Master Engine</option>
                            <option value="owlbear-rodeo" disabled>Owlbear Rodeo</option>
                            <option value="roll20" disabled>Roll20</option>
                            <option value="tabletop-simulator" disabled>Tabletop Simulator</option>
                            <option value="tale-spire" disabled>Tale Spire</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-row">
                    <label for="vtt-address">VTT Address:</label>
                    <input type="text" id="vtt-address" placeholder="http://localhost:30000 or https://example.com" />
                </div>

                <div class="form-row">
                    <label for="username">User Name:</label>
                    <input type="text" id="username" placeholder="Usually Email" />
                </div>

                <div class="form-row">
                    <label for="password">Password:</label>
                    <input type="password" id="password" />
                </div>

                <div class="connect-btn-container">
                    <button type="submit" class="connect-btn">Connect</button>
                </div>
            </form>

            <!-- Footer -->
            <div class="startup-footer">
                <button class="create-account-link" id="create-account-link">Create Free Account</button>
                <img src="/static/Logos/New_logo.png" alt="Realm Bridge" class="realm-bridge-logo" draggable="false" />
            </div>
        </div>
    </div>

    <!-- Settings Panel Overlay (from index.html) -->
    <div id="settings-overlay" class="settings-overlay hidden">
        <div id="settings-panel" class="settings-panel">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="settings-close" class="icon-btn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <h3 class="settings-section-title">Connection</h3>
                    <div class="settings-field">
                        <label for="settings-host">WebSocket Host</label>
                        <input type="text" id="settings-host" value="localhost" placeholder="localhost">
                    </div>
                    <div class="settings-field">
                        <label for="settings-port">WebSocket Port</label>
                        <input type="number" id="settings-port" value="8765" min="1" max="65535">
                    </div>
                </div>
                <div class="settings-section">
                    <h3 class="settings-section-title">Appearance</h3>
                    <div class="settings-field">
                        <label for="settings-theme">Theme</label>
                        <select id="settings-theme">
                            <option value="dark" selected>Dark</option>
                            <option value="light" disabled>Light (Coming Soon)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="settings-footer">
                <button id="settings-save" class="btn btn-primary">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Core Modules -->
    <script src="/static/js/debug.js?v=1"></script>
    <script src="/static/js/utils.js?v=1"></script>
    
    <!-- UI Modules -->
    <script src="/static/js/ui/settings.js?v=1"></script>
    <script src="/static/js/ui/window-control.js?v=1"></script>
    <script>
        // Create account link
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('create-account-link')?.addEventListener('click', () => {
                if (window.pyqtBridge) {
                    window.pyqtBridge.openUrl('https://realmbridge.co.uk/');
                }
            });

            // Form submission
            document.getElementById('startup-form')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const vtt = document.getElementById('vtt-select').value;
                const address = document.getElementById('vtt-address').value;
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                if (window.pyqtBridge) {
                    window.pyqtBridge.connect(vtt, address, username, password);
                }
            });
        });
    </script>
</body>
</html>
